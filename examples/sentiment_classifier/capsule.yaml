name: sentiment-classifier
version: "1.0"
framework: sklearn
model_path: sentiment_model.pkl
python_version: "3.11"
port: 8080

resources:
  cpu_request: "100m"
  cpu_limit: "300m"
  memory_request: "128Mi"
  memory_limit: "512Mi"
  replicas: 1

health:
  path: /health
  port: 8080
  initial_delay_seconds: 10

canary:
  enabled: false

labels:
  team: "ml-platform"
  domain: "nlp"
